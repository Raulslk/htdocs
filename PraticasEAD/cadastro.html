<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Usuário</title>
</head>
<body>
    <header>
       <h1>Faça seu cadastro de conta aqui.</h1>
    </header>

    <main>
        <form action="" method="">
            <label>Digite seu nome:</label>
            <input type="text" name="nome" placeholder="Digite aqui..." class="camp-form">

            <label>Digite seu E-mail:</label>
            <input type="email" name="email" placeholder="Digite aqui..." class="camp-form">

            <label>Selecione sua Data de Nascimento:</label>
            <input type="date" name="data" class="camp-form">

            <label>Selecione um Curso:</label>
            <select name="curso" class="camp-form">
                <option value="">Selecione</option>
                <option value="1">Design Gráfico</option>
                <option value="2">Front-End</option>
                <option value="3">Back-End</option>
                <option value="4">Banco de Dados</option>
            </select>

            <label>Digite seu telefone:</label>
            <input type="number" name="tele" placeholder="Digite aqui..." class="camp-form">

            <label>Digite uma Observação:</label>
            <textarea rows="4" name="obs" placeholder="Digite aqui..." class="camp-form-obs"></textarea>

            <button type="submit" name="btnCadastrar" class="btn-cadastrar">Cadastrar</button>
        </form>
    </main>

    <footer>
        <p>Todos os direitos reservados</p>
    </footer>
</body>
</html>
